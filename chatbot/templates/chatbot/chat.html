<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAGLink AI Assistant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
flex-direction:column;
height:100vh;
}

.header{

background:white;
padding:18px 50px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.logo{

font-size:32px;
font-weight:bold;
color:#1e3a8a;

}

.user{

font-size:17px;

}

.logout{

text-decoration:none;
margin-left:20px;
background:#dc3545;
padding:10px 18px;
border-radius:8px;
color:white;

}

.logout:hover{

background:#bb2d3b;

}

.chat-container{

width:90%;
max-width:1100px;
margin:30px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 18px rgba(0,0,0,.1);
display:flex;
flex-direction:column;
height:78vh;

}

.chat-box{

flex:1;
overflow-y:auto;
padding:25px;

}

.message{

margin-bottom:18px;
padding:16px;
border-radius:12px;
max-width:75%;
line-height:1.6;

}

.bot{

background:#edf3ff;
color:#1e3a8a;

}

.user-msg{

background:#1e3a8a;
color:white;
margin-left:auto;

}

.sources{

margin-top:15px;
padding-top:10px;
border-top:1px solid #dcdcdc;
font-size:14px;

}

.sources ul{

margin-top:8px;
padding-left:18px;

}

.chat-input{

display:flex;
padding:20px;
border-top:1px solid #ddd;

}

.chat-input input{

flex:1;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;

}

.chat-input button{

margin-left:15px;
padding:15px 28px;
background:#1e3a8a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

}

.chat-input button:hover{

background:#173074;

}

.loading{

font-style:italic;
color:#666;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

RAGLink

</div>

<div class="user">

Welcome

<b>{{ request.user.username }}</b>

<a href="{% url 'logout' %}" class="logout">

Logout

</a>

</div>

</div>

<div class="chat-container">

<div class="chat-box" id="chatBox">

<div class="message bot">

<b>👋 Welcome to RAGLink AI Assistant</b>

<br><br>

Ask me anything related to

<ul>

<li>Company Policies</li>

<li>HR Documents</li>

<li>Projects</li>

<li>Technical Documents</li>

<li>Knowledge Base</li>

</ul>

</div>

</div>

<div class="chat-input">

<input
type="text"
id="question"
placeholder="Ask your question..."
autocomplete="off"
>

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

async function sendMessage(){

const input=document.getElementById("question");

const question=input.value.trim();

if(question==="") return;

const chat=document.getElementById("chatBox");

chat.innerHTML+=`

<div class="message user-msg">

${question}

</div>

`;

chat.innerHTML+=`

<div class="message bot loading" id="loading">

Thinking...

</div>

`;

chat.scrollTop=chat.scrollHeight;

input.value="";

try{

const response=await fetch("/chatbot/chat/",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

message:question

})

});

const data=await response.json();

document.getElementById("loading").remove();

let sources="";

if(data.sources && data.sources.length){

sources="<div class='sources'><b>Sources</b><ul>";

data.sources.forEach(function(item){

sources+=`<li>${item.file}</li>`;

});

sources+="</ul></div>";

}

chat.innerHTML+=`

<div class="message bot">

${data.answer}

${sources}

</div>

`;

chat.scrollTop=chat.scrollHeight;

}

catch(e){

document.getElementById("loading").innerHTML="Unable to contact server.";

}

}

document.getElementById("question").addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault();

sendMessage();

}

});

</script>

</body>
</html>
