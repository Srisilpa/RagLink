<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGLink</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
        }

        h1{
            color:#1e3a8a;
            margin-bottom:10px;
        }

        p{
            color:#555;
            margin-bottom:40px;
        }

        .cards{
            display:flex;
            gap:30px;
        }

        .card{
            width:220px;
            padding:30px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-decoration:none;
            color:black;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            background:#1e3a8a;
            color:white;
        }

        .icon{
            font-size:50px;
            margin-bottom:15px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>RAGLink</h1>

    <p>Select your role to continue</p>

    <div class="cards">

        <a href="{% url 'admin_login' %}" class="card">

            <div class="icon">👨‍💼</div>

            <h2>Admin</h2>

        </a>

        <a href="{% url 'teamlead_login' %}" class="card">

            <div class="icon">👩‍💻</div>

            <h2>Team Lead</h2>

        </a>

        <a href="{% url 'employee_login' %}" class="card">

            <div class="icon">👨‍💻</div>

            <h2>Employee</h2>

        </a>

    </div>

</div>

</body>
</html>
