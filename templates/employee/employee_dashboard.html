<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAGLink | Employee Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background:#f4f6f9;
    height:100vh;
}


/* Header */

.header{

    background:white;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);

}


.logo{

    font-size:32px;
    color:#1e3a8a;
    font-weight:bold;

}


.user{

    font-size:17px;

}


.logout{

    margin-left:20px;
    text-decoration:none;
    background:#dc3545;
    color:white;
    padding:10px 18px;
    border-radius:8px;

}


.logout:hover{

    background:#bb2d3b;

}



/* Chat Box */

.chat-container{

    width:75%;
    height:75vh;
    margin:40px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);

    display:flex;
    flex-direction:column;

}



/* Messages */

.chat-box{

    flex:1;
    padding:25px;
    overflow-y:auto;

}


.message{

    padding:15px 20px;
    margin-bottom:15px;
    border-radius:12px;
    max-width:70%;
    font-size:16px;

}


.bot{

    background:#e8eefc;
    color:#1e3a8a;

}


.employee{

    background:#1e3a8a;
    color:white;
    margin-left:auto;

}



/* Input */

.chat-input{

    display:flex;
    padding:20px;
    border-top:1px solid #ddd;

}


.chat-input input{

    flex:1;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;

}


.chat-input button{

    margin-left:15px;
    padding:15px 25px;
    border:none;
    background:#1e3a8a;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;

}


.chat-input button:hover{

    background:#142667;

}



@media(max-width:768px){

.chat-container{

    width:90%;

}


.header{

    padding:20px;

}

}

</style>


</head>


<body>


<!-- Header -->

<div class="header">


<div class="logo">

RAGLink

</div>


<div class="user">

Welcome Employee

<b>{{ request.user.username }}</b>


<a href="{% url 'logout' %}" class="logout">

Logout

</a>


</div>


</div>



<!-- Chat Interface -->


<div class="chat-container">


<div class="chat-box" id="chatBox">


<div class="message bot">

Hello 👋  
I am RAGLink AI Assistant.

Ask me anything related to company documents, policies, placements, or knowledge base.

</div>


</div>



<form class="chat-input" method="POST">


{% csrf_token %}


<input 
type="text" 
name="question"
placeholder="Type your question here..."
required
>


<button type="submit">

Send

</button>


</form>



</div>



</body>

</html>
