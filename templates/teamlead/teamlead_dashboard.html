<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Lead Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.header{

    background:white;

    padding:20px 60px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.logo{

    font-size:30px;

    font-weight:bold;

    color:#1e3a8a;

}

.user{

    font-size:17px;

}

.logout{

    margin-left:20px;

    background:#dc3545;

    color:white;

    text-decoration:none;

    padding:10px 20px;

    border-radius:8px;

}

.logout:hover{

    background:#bb2d3b;

}

.container{

    width:90%;

    max-width:900px;

    margin:60px auto;

    text-align:center;

}

.container h1{

    color:#1e3a8a;

    margin-bottom:10px;

    font-size:38px;

}

.container p{

    color:#666;

    margin-bottom:45px;

    font-size:18px;

}

.cards{

    display:flex;

    justify-content:center;

    gap:40px;

    flex-wrap:wrap;

}

.card{

    width:320px;

    background:white;

    padding:35px;

    border-radius:15px;

    text-decoration:none;

    color:black;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

    transition:.3s;

}

.card:hover{

    background:#1e3a8a;

    color:white;

    transform:translateY(-8px);

}

.icon{

    font-size:60px;

    margin-bottom:20px;

}

.card h2{

    margin-bottom:12px;

}

.card p{

    color:inherit;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

RAGLink

</div>

<div class="user">

Welcome

<b>{{ request.user.username }}</b>

<a href="{% url 'logout' %}" class="logout">

Logout

</a>

</div>

</div>

<div class="container">

<h1>

Team Lead Dashboard

</h1>

<p>

Manage your team's knowledge base and AI assistant.

</p>

<div class="cards">

<a href="{% url 'manage_documents' %}" class="card">

    <div class="icon">
        📚
    </div>

    <h2>
        Project Documents
    </h2>

</a>

<a href="#" class="card">

<div class="icon">

🤖

</div>

<h2>

Ask RAG Assistant

</h2>

</a>

</div>

</div>

</body>

</html>
