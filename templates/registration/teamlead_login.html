<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Lead Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:400px;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
color:#2e7d32;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#388e3c;
}

.error{
color:red;
text-align:center;
margin-bottom:15px;
}

.back{
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>👩‍💻 Team Lead Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="back">
<a href="/">← Back</a>
</div>

</div>

</body>
</html>
