<!DOCTYPE html>
<html>
<head>

<title>
{% if title %}
{{ title }}
{% else %}
Add User
{% endif %}
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
}

.container{
width:550px;
margin:50px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
color:#1e3a8a;
margin-bottom:30px;
text-align:center;
}

label{
display:block;
margin-top:18px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
margin-top:30px;
padding:14px;
background:#1e3a8a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#14306d;
}

.back{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#1e3a8a;
}

.errorlist{
color:red;
list-style:none;
margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>

{% if title %}
{{ title }}
{% else %}
Add New User
{% endif %}

</h1>

<form method="POST">

{% csrf_token %}

<label>Username</label>
{{ form.username }}

<label>First Name</label>
{{ form.first_name }}

<label>Last Name</label>
{{ form.last_name }}

<label>Email</label>
{{ form.email }}

<label>Role</label>
{{ form.role }}

<label>Department</label>
{{ form.department }}

{% if form.password %}

<label>Password</label>
{{ form.password }}

<label>Confirm Password</label>
{{ form.confirm_password }}

{% endif %}

<button type="submit">

{% if title %}
Update User
{% else %}
Create User
{% endif %}

</button>

</form>

<a href="{% url 'manage_users' %}" class="back">

← Back

</a>

</div>

</body>
</html>
