<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
}

.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#198754;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#157347;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#1e3a8a;
}
</style>

</head>
<body>

<div class="container">

<h2>Reset Password</h2>

<p><b>User:</b> {{ user.username }}</p>

<form method="POST">

{% csrf_token %}

<input
type="password"
name="password1"
placeholder="New Password"
required>

<input
type="password"
name="password2"
placeholder="Confirm Password"
required>

<button type="submit">
Reset Password
</button>

</form>

<a href="{% url 'manage_users' %}" class="back">
← Back
</a>

</div>

</body>
</html>
