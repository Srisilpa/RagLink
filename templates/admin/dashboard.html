<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAGLink | Admin Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}


/* Header */

.header{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
    font-size:32px;
    color:#1e3a8a;
    font-weight:bold;
}

.user{
    font-size:17px;
}

.logout{
    margin-left:20px;
    text-decoration:none;
    background:#dc3545;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    transition:.3s;
}

.logout:hover{
    background:#bb2d3b;
}


/* Main */

.container{
    width:90%;
    max-width:1300px;
    margin:60px auto;
    text-align:center;
}

.container h1{
    color:#1e3a8a;
    font-size:40px;
    margin-bottom:10px;
}

.container > p{
    color:#666;
    font-size:18px;
    margin-bottom:50px;
}


/* Cards Layout */

.cards-container{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    flex-wrap:wrap;

}


/* Card */

.card{

    width:300px;
    background:white;
    border-radius:15px;
    padding:35px;
    text-decoration:none;
    color:black;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;

}


.card:hover{

    background:#1e3a8a;
    color:white;
    transform:translateY(-8px);

}


.icon{

    font-size:60px;
    margin-bottom:20px;

}


.card h2{

    margin-bottom:12px;
    font-size:24px;

}


.card p{

    color:inherit;
    font-size:16px;

}



/* Responsive */

@media(max-width:768px){

.header{

    flex-direction:column;
    gap:15px;

}


.cards-container{

    flex-direction:column;

}


}

</style>

</head>


<body>


<div class="header">


<div class="logo">
RAGLink
</div>


<div class="user">

Welcome,

<b>{{ request.user.username }}</b>


<a href="{% url 'logout' %}" class="logout">
Logout
</a>


</div>


</div>



<div class="container">


<h1>Admin Dashboard</h1>


<p>
Manage your organization's AI Knowledge Portal
</p>



<div class="cards-container">


<a href="{% url 'manage_users' %}" class="card">


<div class="icon">
👥
</div>


<h2>
Manage Users
</h2>


<p>
Create, Edit and Delete Users
</p>


</a>





<a href="{% url 'manage_documents' %}" class="card">

    <div class="icon">
        📚
    </div>

    <h2>
        Manage Documents
    </h2>

    <p>
        Manage Documents
    </p>

</a>




<a href="#" class="card">


<div class="icon">
🤖
</div>


<h2>
RAG Chat
</h2>


<p>
Test AI Responses
</p>


</a>



</div>


</div>


</body>
</html>
